<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
    <title>Document</title>
</head>
<body>

    <div id="currentPlayer">CURRENT Player</div>
    <div id="winner"></div>
    
    <div>
        <div data-p="X" class="player-text-display" id="p1-display">Player 1</div>
        <button class="edit-name button" data-p="X" command="show-modal" commandfor="edit-name-dialog">Edit Name</button>
        
    </div>
    <div>
        <div data-p="O" class="player-text-display p2" id="p2-display">Player 2</div>
        <button class="edit-name button" data-p="O" command="show-modal" commandfor="edit-name-dialog">Edit Name</button>
    </div>
    <dialog id="edit-name-dialog" data-p="">
        <p>Edit Player Name</p>
        <form action="" method="get">            
            <div class="form-row-item">
                <label for="name">Name</label>
                <input type="text" id="input-name" name="name" required>
            </div>
        </form>
        <div class="button-wrap">
            <button class="close-button dlg button" commandfor="edit-name-dialog" command="close">Close</button>
            <button type="submit" class="submit-button dlg button">Save</button>
        </div>

    </dialog>
    <div class="board-container">     
    </div>
    <div class="actions">        
    </div>


</body>
</html>
